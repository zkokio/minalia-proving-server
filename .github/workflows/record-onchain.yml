name: Record Verification On-Chain

# Triggered automatically by zk-attest after every verification.
# Records the proof hash on Mina mainnet using the MinaliaVerifier SmartContract.
#
# Requires GitHub Actions secrets:
#   SUPABASE_URL            - Supabase project URL
#   SUPABASE_SERVICE_KEY    - Supabase service role key
#   FEE_PAYER_PRIVATE_KEY   - Fee payer private key (separate regular account)
#   FEE_PAYER_ADDRESS       - Fee payer public address (must match private key)
#   ZKAPP_ADDRESS           - Address of deployed MinaliaVerifier contract

on:
  workflow_dispatch:
    inputs:
      wallet_address:
        description: 'Player wallet address (B62q...)'
        required: true
        type: string

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Record on Mina mainnet
        run: node record-onchain.cjs "${{ github.event.inputs.wallet_address }}"
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          FEE_PAYER_PRIVATE_KEY: ${{ secrets.FEE_PAYER_PRIVATE_KEY }}
          FEE_PAYER_ADDRESS:     ${{ secrets.FEE_PAYER_ADDRESS }}
          ZKAPP_ADDRESS:         ${{ secrets.ZKAPP_ADDRESS }}
