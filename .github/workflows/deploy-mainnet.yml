# .github/workflows/record-onchain.yml
# Run manually to record a verification on Mina mainnet
# Go to Actions → Record Verification On-Chain → Run workflow → enter wallet address

name: Record Verification On-Chain

on:
  workflow_dispatch:
    inputs:
      wallet_address:
        description: 'Player wallet address (B62q...)'
        required: true
        type: string

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Record on Mina mainnet
        run: node record-onchain.cjs "${{ github.event.inputs.wallet_address }}"
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
